version: '3.8'

services:
  db:
    image: postgres:15
    container_name: saas_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - "8080:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: saas_backend
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://postgres:root@db:5432/postgres?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
